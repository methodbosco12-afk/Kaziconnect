<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact KaziConnect</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Arial, sans-serif;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;

            background: linear-gradient(
                135deg,
                #0f172a 0%,
                #1e3a8a 45%,
                #0f766e 100%
            );

            overflow-x: hidden;
            position: relative;
        }

        /* ✨ Glow Effects */
        body::before{
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            background: #38bdf8;

            top: -120px;
            left: -120px;

            filter: blur(140px);

            opacity: 0.18;

            z-index: -1;

            border-radius: 50%;
        }

        body::after{
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            background: #22c55e;

            bottom: -120px;
            right: -120px;

            filter: blur(140px);

            opacity: 0.14;

            z-index: -1;

            border-radius: 50%;
        }

        /* 📦 Main Card */
        .container{

            width: 100%;
            max-width: 430px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

            border: 1px solid rgba(255,255,255,0.12);

            border-radius: 28px;

            padding: 32px 24px;

            box-shadow:
                0 12px 40px rgba(0,0,0,0.35);

            color: white;
        }

        /* 🔥 Logo */
        .logo{
            width: 75px;
            height: 75px;

            margin: auto auto 18px;

            border-radius: 22px;

            background: linear-gradient(
                135deg,
                #38bdf8,
                #22c55e
            );

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 34px;

            box-shadow:
                0 8px 25px rgba(56,189,248,0.35);
        }

        /* 📝 Heading */
        h1{
            text-align: center;

            font-size: 30px;
            font-weight: 700;

            margin-bottom: 10px;

            background: linear-gradient(
                90deg,
                #ffffff,
                #38bdf8,
                #22c55e
            );

            background-clip: text;
            -webkit-background-clip: text;

            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        .subtitle{
            text-align: center;

            color: #cbd5e1;

            font-size: 15px;
            line-height: 1.6;

            margin-bottom: 32px;
        }

        /* 🔘 Buttons */
        .btn-group{
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn{

            display: flex;
            align-items: center;
            gap: 16px;

            text-decoration: none;
            color: white;

            padding: 18px;

            border-radius: 20px;

            transition: 0.3s ease;

            box-shadow:
                0 8px 24px rgba(0,0,0,0.25);
        }

        .btn:hover{
            transform: translateY(-4px) scale(1.02);
        }

        .whatsapp{
            background: linear-gradient(
                135deg,
                #16a34a,
                #25D366
            );
        }

        .email{
            background: linear-gradient(
                135deg,
                #2563eb,
                #60a5fa
            );
        }

        /* 📱 Icon */
        .icon{
            width: 52px;
            height: 52px;

            border-radius: 16px;

            background: rgba(255,255,255,0.18);

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 26px;

            flex-shrink: 0;
        }

        /* ✍️ Text */
        .text{
            display: flex;
            flex-direction: column;
        }

        .text strong{
            font-size: 18px;
            margin-bottom: 3px;
        }

        .text small{
            font-size: 13px;
            opacity: 0.92;
        }

        /* 📱 Mobile */
        @media (max-width: 480px){

            body{
                padding: 16px;
            }

            .container{
                padding: 28px 20px;
                border-radius: 24px;
            }

            h1{
                font-size: 26px;
            }

            .subtitle{
                font-size: 14px;
            }

            .btn{
                padding: 16px;
            }

            .icon{
                width: 48px;
                height: 48px;
                font-size: 24px;
            }

            .text strong{
                font-size: 16px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            📞
        </div>

        <h1>Contact KaziConnect</h1>

        <p class="subtitle">
            Chagua njia rahisi ya kuwasiliana nasi
        </p>

        <div class="btn-group">

            <!-- WhatsApp -->
            <a href="{{ url_for('contact_form', channel='whatsapp') }}"
               class="btn whatsapp">

                <div class="icon">
                    💬
                </div>

                <div class="text">
                    <strong>WhatsApp</strong>
                    <small>Ongea nasi moja kwa moja</small>
                </div>

            </a>

            <!-- Email -->
            <a href="{{ url_for('contact_form', channel='email') }}"
               class="btn email">

                <div class="icon">
                    📧
                </div>

                <div class="text">
                    <strong>Email</strong>
                    <small>Tuma ujumbe rasmi</small>
                </div>

            </a>

        </div>

    </div>

</body>
</html>
