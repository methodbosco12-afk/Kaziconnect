<!DOCTYPE html>
<html>
<head>
    <title>KaziConnect</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            color: #2c3e50;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;
            background: #3498db;

            border-radius: 8px;
            font-size: 18px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .register {
            background: #27ae60;
        }

        .register:hover {
            background: #1e8449;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Karibu KaziConnect</h1>

    <!-- LOGIN FUNDI -->
    <a class="btn" href="/login/fundi">Login as Fundi</a>

    <!-- LOGIN CONTRACTOR -->
    <a class="btn" href="/search">Tafuta mtu mwenye ujuzi</a>

    <!-- REGISTER FUNDI -->
    <a class="btn register" href="/register/fundi">Register Fundi(mtu mwenye ujuzi)</a>

</div>

</body>
</html>
