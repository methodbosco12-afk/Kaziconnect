{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   GLOBAL RESET (MOBILE FIRST)
========================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
}

/* reduce animation for mobile performance */
@media (prefers-reduced-motion: reduce) {
    * {
        animation: none !important;
        transition: none !important;
    }
}

/* =========================
   HERO SECTION
========================= */
.hero {
    text-align: center;
    padding: 50px 20px 30px;
}

.hero h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #ffffff;
}

.hero p {
    font-size: 15px;
    color: #cbd5e1;
    margin: 0;
}

/* =========================
   CONTAINER
========================= */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* =========================
   GRID (MOBILE FIRST)
========================= */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    margin-top: 25px;
}

/* desktop upgrade */
@media (min-width: 768px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
    }

    .hero h1 {
        font-size: 34px;
    }
}

/* =========================
   CARD DESIGN (PROFESSIONAL SaaS STYLE)
========================= */
.card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    transition: 0.25s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.10);
}

/* clickable full card */
.card a {
    text-decoration: none;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    display: block;
}

/* =========================
   BUTTON COLORS (SUBTLE, PROFESSIONAL)
========================= */
.blue { border-left: 4px solid #38bdf8; }
.green { border-left: 4px solid #22c55e; }
.darkblue { border-left: 4px solid #3b82f6; }

/* =========================
   SOCIAL SECTION (CLEAN FOOTER STYLE)
========================= */
.social-footer {
    margin-top: 50px;
    padding: 25px 15px;
    text-align: center;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
}

.social-footer h3 {
    font-size: 16px;
    margin-bottom: 15px;
    color: #fff;
}

/* social buttons */
.social-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.social-links a {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    text-decoration: none;
    color: #fff;
    font-weight: 500;
}

/* brand colors */
.facebook { background: #1877f2; }
.instagram { background: #e1306c; }
.linkedin { background: #0077b5; }
.tiktok { background: #111; }

/* =========================
   MOBILE OPTIMIZATION
========================= */
@media (max-width: 480px) {
    .hero h1 {
        font-size: 22px;
    }

    .card a {
        font-size: 15px;
    }

    .social-links a {
        width: 100%;
        text-align: center;
    }
}

</style>

<!-- HERO -->
<div class="hero">
    <h1>🔥 Karibu KaziConnect</h1>
    <p>Pata kazi au fundi kwa haraka na kwa urahisi</p>
</div>

<!-- MAIN -->
<div class="container">

    <div class="grid">

        <div class="card blue">
            <a href="/login/fundi">👷 Login as Fundi</a>
        </div>

        <div class="card darkblue">
            <a href="/search">🔍 Tafuta Mfanyakazi</a>
        </div>

        <div class="card green">
            <a href="/register/fundi">➕ Register Fundi</a>
        </div>

    </div>

    <!-- SOCIAL -->
    <div class="social-footer">

        <h3>🌐 Tufollow Kwenye Social Media</h3>

        <div class="social-links">

            <a class="facebook" href="https://facebook.com/kaziconnectTz" target="_blank">
                Facebook
            </a>

            <a class="instagram" href="https://instagram.com/kaziconnecttz" target="_blank">
                Instagram
            </a>

            <a class="linkedin" href="https://www.linkedin.com/in/method-john-8149553b9" target="_blank">
                LinkedIn
            </a>

            <a class="tiktok" href="https://tiktok.com/@kaziconnectofficial" target="_blank">
                TikTok
            </a>

        </div>

        <p style="margin-top:15px; font-size:12px; color:#94a3b8;">
            © 2026 KaziConnect Tanzania
        </p>

    </div>

</div>

{% endblock %}
