<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;

        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        padding: 20px;

        background: linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
        overflow-x: hidden;
    }

    /* glow background effects */
    body::before,
    body::after {
        content: "";
        position: fixed;
        width: 450px;
        height: 450px;
        filter: blur(160px);
        z-index: -1;
    }

    body::before {
        background: #38bdf8;
        opacity: 0.15;
        top: -100px;
        left: -100px;
    }

    body::after {
        background: #22c55e;
        opacity: 0.12;
        bottom: -100px;
        right: -100px;
    }

    /* MAIN CARD */
    .settings-box {
        width: 100%;
        max-width: 420px;

        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 18px;

        backdrop-filter: blur(14px);

        padding: 20px;

        box-shadow: 0 15px 40px rgba(0,0,0,0.35);

        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    h2 {
        text-align: center;
        color: white;
        margin-bottom: 10px;
    }

    h3 {
        color: #e2e8f0;
        margin-bottom: 10px;
        font-size: 15px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;

        border: none;
        outline: none;

        background: rgba(255,255,255,0.1);
        color: white;

        margin-bottom: 8px;
    }

    input::placeholder {
        color: #94a3b8;
    }

    label {
        color: #cbd5e1;
        font-size: 13px;
        display: block;
        margin-bottom: 6px;
    }

    button {
        width: 100%;
        padding: 12px;

        border: none;
        border-radius: 12px;

        background: linear-gradient(90deg,#38bdf8,#22c55e);
        color: white;

        font-weight: bold;
        cursor: pointer;

        transition: 0.3s;
        margin-top: 8px;
    }

    button:hover {
        transform: scale(1.02);
    }

    hr {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.1);
        margin: 10px 0;
    }

    /* CHECKBOX FIX */
    .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #cbd5e1;
        font-size: 14px;
        margin-bottom: 6px;
    }

    .danger-btn {
        background: #ef4444 !important;
    }

    @media (max-width: 480px) {
        .settings-box {
            max-width: 100%;
            border-radius: 14px;
        }
    }
</style>

<div class="settings-box">

    <h2>⚙️ Settings</h2>

    <!-- 🔐 PASSWORD -->
    <form method="POST">
        <input type="hidden" name="action" value="change_password">

        <h3>🔐 Change Password</h3>

        <input type="password" name="current_password" placeholder="Current Password" required>
        <input type="password" name="new_password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Change Password</button>
    </form>

    <hr>

    <!-- 📱 CONTACT -->
    <form method="POST">
        <input type="hidden" name="action" value="update_contact">

        <h3>📱 Email & Phone</h3>

        <input type="text" name="phone" value="{{ user.phone }}" placeholder="Phone">
        <input type="email" name="email" value="{{ user.email }}" placeholder="Email">

        <button type="submit">Update</button>
    </form>

    <hr>

    <!-- 🔔 NOTIFICATIONS -->
    <form method="POST">
        <input type="hidden" name="action" value="notifications">

        <h3>🔔 Notifications</h3>

        <label class="checkbox">
            <input type="checkbox" name="sms_notifications"
                   {% if user.sms_notifications %}checked{% endif %}>
            SMS Notifications
        </label>

        <label class="checkbox">
            <input type="checkbox" name="email_notifications"
                   {% if user.email_notifications %}checked{% endif %}>
            Email Notifications
        </label>

        <button type="submit">Save</button>
    </form>

    <hr>

    <!-- 🗑️ DELETE -->
    <form method="POST">
        <input type="hidden" name="action" value="delete_account">

        <h3 style="color:#f87171;">Delete Account</h3>

        <input type="password" name="password" placeholder="Confirm Password" required>

        <button type="submit" class="danger-btn">
            Delete Account
        </button>
    </form>

</div>
