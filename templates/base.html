<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KaziConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    min-height: 100vh;
    background: #0f172a;
    color: white;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 220px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.1);
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
}

.sidebar h3 {
    margin-top: 0;
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin-bottom: 8px;
    text-decoration: none;
    color: #cbd5e1;
    border-radius: 8px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.1);
    color: white;
}

/* ACTIVE MENU */
.sidebar a.active {
    background: linear-gradient(90deg,#38bdf8,#22c55e);
    color: black;
    font-weight: bold;
}

/* ================= NOTIFICATION ================= */
.notif-icon {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #cbd5e1;
}

.badge {
    position: absolute;
    top: 2px;
    right: 10px;
    background: red;
    color: white;
    font-size: 10px;
    border-radius: 50%;
    padding: 2px 6px;
}

/* ================= CONTENT ================= */
.content {
    margin-left: 240px;
    padding: 20px;
    width: 100%;
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar {
        display: none;
    }

    .content {
        margin-left: 0;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>⚡ KaziConnect</h3>

    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
        🏠 Dashboard
    </a>

    <a href="/search" class="{% if request.path == '/search' %}active{% endif %}">
        🔍 Search
    </a>

    <a href="/profile" class="{% if '/profile' in request.path %}active{% endif %}">
        👤 Profile
    </a>

    <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">
        📌 About Us
    </a>

    <a href="/contact" class="{% if request.path == '/contact' %}active{% endif %}">
        📞 Contact
    </a>

    <!-- NOTIFICATIONS -->
    <a href="{{ url_for('notifications_page') }}" class="notif-icon">
        🔔 Notifications
        <span id="notif-count" class="badge">0</span>
    </a>

    <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">
        ⚙️ Settings
    </a>

    <hr>

    <a href="/logout" style="color:red;">
        🚪 Logout
    </a>

</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- AUTO UPDATE NOTIFICATIONS -->
<script>
async function loadNotifCount(){
    try{
        let res = await fetch("/notifications/unread_count");
        let data = await res.json();

        document.getElementById("notif-count").innerText = data.count;
    } catch(e){
        console.log("notif error", e);
    }
}

setInterval(loadNotifCount, 5000);
loadNotifCount();
</script>

</body>
</html>
