<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KaziConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   GLOBAL RESET
========================= */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;

    background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #22c55e);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;

    min-height: 100vh;
    overflow-x: hidden;
}

/* animated background */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

/* =========================
   SIDEBAR (DESKTOP)
========================= */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;

    width: 230px;
    padding: 20px;

    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(12px);

    z-index: 1000;

    display: flex;
    flex-direction: column;
    gap: 12px;
}

.sidebar h3 {
    margin: 0 0 10px 0;
    font-size: 18px;
}

.sidebar a {
    color: white;
    text-decoration: none;
    font-size: 14px;

    padding: 10px;
    border-radius: 10px;

    transition: 0.2s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.08);
}

/* 🔥 ACTIVE SIDEBAR */
.sidebar a.active {
    background: rgba(34,197,94,0.2);
    border-left: 4px solid #22c55e;
    font-weight: bold;
}

.sidebar hr {
    border: 1px solid rgba(255,255,255,0.1);
}

/* =========================
   CONTENT AREA
========================= */
.content {
    position: relative;
    z-index: 2;

    margin-left: 230px;
    padding: 20px;

    padding-bottom: 100px; /* safe for mobile nav */
}

/* =========================
   BOTTOM NAV (MOBILE)
========================= */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

    display: none;

    justify-content: space-around;
    align-items: center;

    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(10px);

    border-top: 1px solid rgba(255,255,255,0.1);

    padding: 8px 0;

    z-index: 1000;
}

.bottom-nav a {
    text-decoration: none;
    color: white;

    font-size: 12px;
    text-align: center;
    flex: 1;
}

.bottom-nav a span {
    display: block;
    font-size: 18px;
}

/* 🔥 ACTIVE BOTTOM NAV */
.bottom-nav a.active {
    color: #22c55e;
}

/* =========================
   MOBILE RESPONSIVE
========================= */
@media (max-width: 768px) {

    .sidebar {
        display: none;
    }

    .content {
        margin-left: 0;
    }

    .bottom-nav {
        display: flex;
    }
}

</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h3>⚡ KaziConnect</h3>

    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
        🏠 Dashboard
    </a>

    <a href="/profile" class="{% if '/profile' in request.path %}active{% endif %}">
        👤 Profile
    </a>

    <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">
        📌 About Us
    </a>

    <a href="/contact" class="{% if request.path == '/contact' %}active{% endif %}">
        📞 Contact
    </a>

    <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">
        ⚙️ Settings
    </a>

    <hr>

    <a href="/logout" style="color:red;">
        🚪 Logout
    </a>
</div>

<!-- ================= CONTENT ================= -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- ================= BOTTOM NAV ================= -->
<div class="bottom-nav">

    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
        <span>🏠</span>
        Home
    </a>

    <a href="/search" class="{% if request.path == '/search' %}active{% endif %}">
        <span>🔍</span>
        Search
    </a>

    <a href="/profile" class="{% if '/profile' in request.path %}active{% endif %}">
        <span>👤</span>
        Profile
    </a>

    <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">
        <span>⚙️</span>
        Settings
    </a>

</div>

</body>
</html>
