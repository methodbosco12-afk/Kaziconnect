<!DOCTYPE html>
<html>
<head>
    <title>Search Fundi - KaziConnect</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;

            background: linear-gradient(
                135deg,
                #0f172a 0%,
                #1e3a8a 40%,
                #0f766e 100%
            );

            overflow-x: hidden;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            filter: blur(160px);
            z-index: -1;
        }

        body::before {
            background: #38bdf8;
            opacity: 0.15;
            top: -120px;
            left: -120px;
        }

        body::after {
            background: #22c55e;
            opacity: 0.12;
            bottom: -120px;
            right: -120px;
        }

        /* =========================
           SEARCH CARD
        ========================== */
        .search-card {
            width: 100%;
            max-width: 420px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);

            border-radius: 18px;
            padding: 22px;

            border: 1px solid rgba(255,255,255,0.12);

            box-shadow: 0 15px 40px rgba(0,0,0,0.3);

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* =========================
           TITLE (FIXED - NO WARNING)
        ========================== */
        .title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;

            color: #ffffff;
        }

        @supports (-webkit-background-clip: text) {
            .title {
                background: linear-gradient(90deg,#ffffff,#38bdf8,#22c55e);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }

        label {
            color: #cbd5e1;
            font-size: 13px;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;

            font-size: 14px;

            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            margin-top: 10px;
            padding: 12px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(90deg,#38bdf8,#22c55e);
            color: white;

            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        /* =========================
           MOBILE FIX
        ========================== */
        @media (max-width: 480px) {
            body {
                align-items: center;
            }

            .search-card {
                margin-top: 0;
            }
        }
    </style>
</head>

<body>

    <body>

<form class="search-card" method="GET" action="{{ url_for('results') }}">

    <h2 class="title">🔍 Tafuta  Mafundi au wafanyakazi walio karibu yako</h2>

    <label>Skills</label>
    <input
        type="text"
        name="skills"
        placeholder="mf: software developer"
        value="{{ request.args.get('skills','') }}"
    >

    <label>Experience</label>
    <input
        type="text"
        name="experience"
        placeholder="mf: 2 years"
        value="{{ request.args.get('experience','') }}"
    >

    <label>Location</label>
    <input
        type="text"
        name="location"
        placeholder="mf: Dar es Salaam"
        value="{{ request.args.get('location','') }}"
    >

    <button type="submit">Search</button>

</form>

</body>
</html>
