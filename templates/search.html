<!DOCTYPE html>
<html>
<head>
    <title>Search Fundi - KaziConnect</title>

    <style>
        /* 🌌 BACKGROUND */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;

            background: linear-gradient(
                135deg,
                #0f172a 0%,
                #1e3a8a 40%,
                #0f766e 100%
            );

            overflow-x: hidden;
        }

        /* ✨ GLOW EFFECT */
        body::before {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: #38bdf8;
            filter: blur(160px);
            opacity: 0.15;
            top: -120px;
            left: -120px;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: #22c55e;
            filter: blur(160px);
            opacity: 0.12;
            bottom: -120px;
            right: -120px;
            z-index: -1;
        }

        /* 📦 CONTAINER */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 100px;
        }

        /* 🔥 TITLE (SAFE GRADIENT TEXT - NO ERROR) */
        .title {
            font-size: 30px;
            margin-bottom: 25px;

            background: linear-gradient(90deg,#fff,#38bdf8,#22c55e);

            background-clip: text;
            -webkit-background-clip: text;

            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        /* 🧊 GLASS SEARCH BOX */
        .search-box {
            display: flex;
            gap: 10px;
            padding: 18px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);

            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);

            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* 🔎 INPUTS */
        .search-box input {
            padding: 12px;
            width: 180px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 14px;
        }

        /* 🚀 BUTTON */
        .search-box button {
            padding: 12px 18px;

            background: linear-gradient(90deg,#38bdf8,#22c55e);
            color: white;

            border: none;
            border-radius: 10px;

            cursor: pointer;
            font-weight: bold;

            transition: 0.3s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        /* 📱 MOBILE */
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
                width: 90%;
            }

            .search-box input {
                width: 100%;
            }

            .title {
                font-size: 22px;
                text-align: center;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="title">
        🔍 Tafuta mafundi walio karibu yako
    </div>

    <div class="search-box">
        <form method="GET" action="/results">

            <input type="text" name="skills" placeholder="Skills">
            <input type="text" name="experience" placeholder="Experience">
            <input type="text" name="location" placeholder="Location">

            <button type="submit">Search</button>

        </form>
    </div>

</div>

</body>
</html>
