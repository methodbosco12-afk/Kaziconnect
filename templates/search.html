<style>
/* =========================
   FULL PAGE BACKGROUND
========================= */
.search-page{

    min-height: 100vh;
    width: 100%;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 18px;

    background:
        radial-gradient(circle at top,#1e293b,#020617 60%),
        linear-gradient(135deg,#0f172a,#020617);

}

/* =========================
   SEARCH CARD
========================= */
.search-card{

    width: 100%;
    max-width: 480px;

    padding: 22px;

    border-radius: 22px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(22px);

    border: 1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 10px 40px rgba(0,0,0,0.45),
        0 0 40px rgba(56,189,248,0.08);

    animation: fadeIn 0.5s ease-in-out;
}

/* =========================
   TITLE
========================= */
.search-title{
    font-size: 22px;
    font-weight: 800;
    color: white;
    margin-bottom: 6px;
}

.search-subtitle{
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 18px;
}

/* =========================
   INPUTS
========================= */
.search-input{

    width: 100%;

    padding: 15px 14px;

    margin-bottom: 12px;

    border-radius: 14px;

    border: 1px solid rgba(255,255,255,0.1);

    background: rgba(15,23,42,0.7);

    color: white;

    font-size: 15px;

    outline: none;

    transition: 0.25s;
}

.search-input::placeholder{
    color: #94a3b8;
}

.search-input:focus{

    border-color: #38bdf8;

    box-shadow:
        0 0 0 3px rgba(56,189,248,0.25),
        0 0 20px rgba(56,189,248,0.15);
}

/* =========================
   BUTTON
========================= */
.search-btn{

    width: 100%;

    padding: 15px;

    margin-top: 6px;

    border: none;

    border-radius: 14px;

    font-size: 15px;
    font-weight: 700;

    cursor: pointer;

    color: white;

    background: linear-gradient(135deg,#38bdf8,#22c55e,#06b6d4);

    box-shadow: 0 15px 30px rgba(34,197,94,0.25);

    transition: 0.3s;
}

.search-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(56,189,248,0.35);
}

/* =========================
   MOBILE OPTIMIZATION
========================= */
@media (max-width: 768px){

    .search-card{
        width: 100%;
        max-width: 100%;
        border-radius: 18px;
        padding: 18px;
    }

    .search-title{
        font-size: 20px;
    }

    .search-input{
        font-size: 16px; /* mobile readable */
    }

    .search-btn{
        font-size: 16px;
        padding: 16px;
    }
}

/* =========================
   ANIMATION
========================= */
@keyframes fadeIn{
    from{
        opacity: 0;
        transform: translateY(10px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

<div class="search-page">

    <form class="search-card" method="GET" action="{{ url_for('results') }}">

        <div class="search-title">🔍 Tafuta Fundi</div>
        <div class="search-subtitle">Andika skills, experience au location</div>

        <input
            class="search-input"
            type="text"
            name="skills"
            placeholder="🔧 Mf: Electrician, Software Developer"
        >

        <input
            class="search-input"
            type="text"
            name="experience"
            placeholder="💼 Mf: 2 years experience"
        >

        <input
            class="search-input"
            type="text"
            name="location"
            placeholder="📍 Mf: Dar es Salaam"
        >

        <button type="submit" class="search-btn">
            🔍 Tafuta Fundi
        </button>

    </form>

</div>
