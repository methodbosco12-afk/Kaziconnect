<!DOCTYPE html>
<html>
<head>
    <title>Admin - Contact Payments</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #2f80ed;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f1f7ff;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .approve {
            background: #27ae60;
            color: white;
        }

        .reject {
            background: #eb5757;
            color: white;
        }

        .pending {
            color: orange;
            font-weight: bold;
        }

        .approved {
            color: green;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>💰 Contact Payments</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Fundi</th>
            <th>Phone</th>
            <th>Transaction</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for p in payments %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.fundi_id }}</td>
            <td>{{ p.phone }}</td>
            <td>{{ p.transaction_id }}</td>
            <td>{{ p.amount }}</td>

            <td>
                {% if p.is_paid %}
                    <span class="approved">Approved</span>
                {% else %}
                    <span class="pending">Pending</span>
                {% endif %}
            </td>

            <td>
                {% if not p.is_paid %}
                    <a class="btn approve" href="{{ url_for('approve_contact', id=p.id) }}">Approve</a>
                {% else %}
                    ✔
                {% endif %}
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
