<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Fundi - KaziConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
    color:white;
}

/* CARD */
.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    padding:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* PROGRESS */
.progress{
    height:6px;
    width:100%;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:18px;
}

.progress-bar{
    height:100%;
    width:33%;
    background:linear-gradient(90deg,#38bdf8,#22c55e);
    transition:0.3s;
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:5px;
}

p{
    text-align:center;
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:15px;
}

/* ERROR */
.error{
    background:rgba(239,68,68,0.15);
    color:#fca5a5;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:13px;
    text-align:center;
}

/* STEPS */
.step{
    display:none;
}

.step.active{
    display:block;
}

/* INPUTS */
input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:14px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

input::placeholder{
    color:#94a3b8;
}

/* BUTTONS */
.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:14px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#3b82f6,#22c55e);
}

.btn.secondary{
    background:rgba(255,255,255,0.12);
}

/* NAV */
.nav{
    display:flex;
    gap:10px;
}

.nav button{
    flex:1;
}

</style>
</head>

<body>

<div class="container">

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <h2>Register Fundi</h2>
    <p>Create your professional profile</p>

    <!-- FLASH ERROR SUPPORT -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

<form method="POST" enctype="multipart/form-data">

<!-- STEP 1 -->
<div class="step active">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email" required>

    <button type="button" class="btn" onclick="nextStep()">
        Next →
    </button>

</div>

<!-- STEP 2 -->
<div class="step">

    <input type="text" name="skills" placeholder="Skills e.g Electrician, Plumber" required>
    <input type="text" name="experience" placeholder="Experience e.g 3 years" required>
    <input type="text" name="location" placeholder="Location" required>

    <div class="nav">
        <button type="button" class="btn secondary" onclick="prevStep()">
            ← Back
        </button>

        <button type="button" class="btn" onclick="nextStep()">
            Next →
        </button>
    </div>

</div>

<!-- STEP 3 -->
<div class="step">

    <input type="password" name="password" placeholder="Password" required>
    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

    <input type="file" name="image" required>

    <div class="nav">
        <button type="button" class="btn secondary" onclick="prevStep()">
            ← Back
        </button>

        <button type="submit" class="btn">
            Create Account 🚀
        </button>
    </div>

</div>

</form>

</div>

<script>

let step = 0;
const steps = document.querySelectorAll(".step");
const bar = document.getElementById("bar");

function showStep(i){
    steps.forEach(s => s.classList.remove("active"));
    steps[i].classList.add("active");
    bar.style.width = ((i+1)/steps.length)*100 + "%";
}

function nextStep(){
    if(step < steps.length - 1){
        step++;
        showStep(step);
    }
}

function prevStep(){
    if(step > 0){
        step--;
        showStep(step);
    }
}

</script>

</body>
</html>
